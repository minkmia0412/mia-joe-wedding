<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Mia &amp; Joe · 10.10.2026</title>

<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=EB+Garamond:ital,wght@0,400;0,500;0,600;0,700;1,400;1,500;1,600&display=swap" rel="stylesheet" />

<style>
  /* ---------- @font-face ---------- */
  @font-face {
    font-family: "Zaslia";
    src: url("fonts/Zaslia.otf") format("opentype");
    font-weight: 400;
    font-style: normal;
    font-display: swap;
  }
  @font-face {
    font-family: "PP Editorial New";
    src: url("fonts/PPEditorialNew-Regular.otf") format("opentype");
    font-weight: 400;
    font-style: normal;
    font-display: swap;
  }
  @font-face {
    font-family: "PP Editorial New";
    src: url("fonts/PPEditorialNew-Italic.otf") format("opentype");
    font-weight: 400;
    font-style: italic;
    font-display: swap;
  }
  @font-face {
    font-family: "PP Editorial New";
    src: url("fonts/PPEditorialNew-Ultralight.otf") format("opentype");
    font-weight: 200;
    font-style: normal;
    font-display: swap;
  }
  @font-face {
    font-family: "PP Editorial New";
    src: url("fonts/PPEditorialNew-UltralightItalic.otf") format("opentype");
    font-weight: 200;
    font-style: italic;
    font-display: swap;
  }
  @font-face {
    font-family: "PP Editorial New";
    src: url("fonts/PPEditorialNew-Ultrabold.otf") format("opentype");
    font-weight: 800;
    font-style: normal;
    font-display: swap;
  }
  @font-face {
    font-family: "Sohne Breit";
    src: url("fonts/TestSohneBreit-Extraleicht.otf") format("opentype");
    font-weight: 200;
    font-style: normal;
    font-display: swap;
  }
  @font-face {
    font-family: "Sohne Breit";
    src: url("fonts/TestSohneBreit-Leicht.otf") format("opentype");
    font-weight: 300;
    font-style: normal;
    font-display: swap;
  }
  @font-face {
    font-family: "Sohne Breit";
    src: url("fonts/TestSohneBreit-Buch.otf") format("opentype");
    font-weight: 400;
    font-style: normal;
    font-display: swap;
  }
  @font-face {
    font-family: "Sohne Breit";
    src: url("fonts/TestSohneBreit-BuchKursiv.otf") format("opentype");
    font-weight: 400;
    font-style: italic;
    font-display: swap;
  }
  @font-face {
    font-family: "Sohne Breit";
    src: url("fonts/TestSohneBreit-Kraftig.otf") format("opentype");
    font-weight: 500;
    font-style: normal;
    font-display: swap;
  }
  @font-face {
    font-family: "Sohne Breit";
    src: url("fonts/TestSohneBreit-Halbfett.otf") format("opentype");
    font-weight: 600;
    font-style: normal;
    font-display: swap;
  }
  @font-face {
    font-family: "Anonymous Pro";
    src: url("fonts/AnonymousPro-Regular.ttf") format("truetype");
    font-weight: 400;
    font-style: normal;
    font-display: swap;
  }
  @font-face {
    font-family: "Anonymous Pro";
    src: url("fonts/AnonymousPro-Italic.ttf") format("truetype");
    font-weight: 400;
    font-style: italic;
    font-display: swap;
  }
  @font-face {
    font-family: "Anonymous Pro";
    src: url("fonts/AnonymousPro-Bold.ttf") format("truetype");
    font-weight: 700;
    font-style: normal;
    font-display: swap;
  }
  @font-face {
    font-family: "Anonymous Pro";
    src: url("fonts/AnonymousPro-BoldItalic.ttf") format("truetype");
    font-weight: 700;
    font-style: italic;
    font-display: swap;
  }

  :root {
    /* Backgrounds */
    --bg-cream:  #FCF7F2;
    --bg-light:  #F1EEE6;
    --bg-warm:   #F0EAD8;
    --bg-mid:    #DAD6CB;
    --bg-brown:  #391817;
    --bg-tan:    #796D51;

    /* Ink */
    --ink:       #050505;
    --ink-1:     #3D3C3A;
    --ink-2:     #6F6F6F;

    /* Accents */
    --wine:      #4C0000;
    --merlot:    #6B2D2D;
    --terra:     #9F523E;
    --olive:     #757153;
    --sage:      #AC9D60;
    --pink-1:    #C9A8A2;
    --pink-2:    #D9BFBA;
    --pink-3:    #E8D1CC;

    /* Type */
    --f-zaslia:  "Zaslia", "Bodoni Moda", "Times New Roman", serif;
    --f-display: "PP Editorial New", "EB Garamond", "Times New Roman", serif;
    --f-display-alt: "Zaslia", "Bodoni Moda", serif;
    --f-serif:   "EB Garamond", "PP Editorial New", "Times New Roman", serif;
    --f-sohne:   "Sohne Breit", ui-sans-serif, system-ui, sans-serif;
    --f-mono:    "Anonymous Pro", ui-monospace, "SF Mono", Menlo, monospace;
  }

  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; }
  html { scroll-behavior: smooth; }

  body {
    background: var(--bg-cream);
    color: var(--ink);
    font-family: var(--f-display);
    font-weight: 400;
    font-size: 17px;
    line-height: 1.2;
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
    overflow-x: hidden;
  }

  /* ---------- Typography ---------- */
  .display-1 {
    font-family: var(--f-zaslia);
    font-weight: 400;
    font-size: clamp(72px, 13.5vw, 220px);
    line-height: 0.92;
    letter-spacing: 0.005em;
    color: var(--ink);
    text-transform: uppercase;
  }
  .display-2 {
    font-family: var(--f-display);
    font-weight: 400;
    font-size: clamp(48px, 7vw, 108px);
    line-height: 0.98;
    letter-spacing: -0.01em;
  }
  .h-1 {
    font-family: var(--f-display);
    font-weight: 400;
    font-size: clamp(40px, 5.5vw, 80px);
    line-height: 1.05;
    letter-spacing: -0.005em;
  }
  .h-2 {
    font-family: var(--f-display);
    font-weight: 400;
    font-size: clamp(28px, 3.4vw, 44px);
    line-height: 1.15;
    letter-spacing: -0.003em;
  }
  .h-3 {
    font-family: var(--f-display);
    font-style: italic;
    font-weight: 400;
    font-size: clamp(20px, 2.2vw, 28px);
    line-height: 1.3;
  }
  .h-section {
    font-family: var(--f-zaslia);
    font-weight: 400;
    font-size: clamp(56px, 8.4vw, 124px);
    line-height: 0.95;
    letter-spacing: 0.005em;
    text-transform: uppercase;
  }
  .eyebrow {
    font-family: var(--f-mono);
    font-size: 11px;
    font-weight: 400;
    letter-spacing: 0.22em;
    text-transform: uppercase;
    color: var(--ink-1);
  }
  .eyebrow-sm {
    font-family: var(--f-mono);
    font-size: 10px;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--ink-2);
  }
  .mono {
    font-family: var(--f-mono);
    letter-spacing: 0.04em;
  }
  .body-lg {
    font-family: var(--f-display);
    font-weight: 400;
    font-size: 19px;
    line-height: 1.25;
    color: var(--ink-1);
  }
  .body {
    font-family: var(--f-display);
    font-weight: 400;
    font-size: 17px;
    line-height: 1.25;
    color: var(--ink-1);
  }

  /* ---------- Layout ---------- */
  .container {
    width: 100%;
    max-width: 1280px;
    margin: 0 auto;
    padding: 0 32px;
  }
  .container-narrow {
    width: 100%;
    max-width: 880px;
    margin: 0 auto;
    padding: 0 32px;
  }
  section {
    padding: 100px 0;
    position: relative;
  }
  section[data-screen-label] { scroll-margin-top: 110px; }

  /* Big section display title */
  .section-display-title {
    font-family: var(--f-display);
    font-style: italic;
    font-weight: 350;
    font-size: 50px;
    line-height: 1;
    letter-spacing: -1px;
    color: var(--ink);
    text-align: center;
    margin: 0 auto 40px;
  }

  /* Minimal section header (Söhne Breit Kraftig) */
  .section-header {
    text-align: center;
    margin-bottom: 28px;
  }
  .section-header-label {
    font-family: var(--f-sohne);
    font-weight: 500;
    font-size: 18px;
    letter-spacing: 0.05em;
    text-transform: uppercase;
    color: var(--ink);
  }
  .section-header-rule {
    width: 12px;
    height: 1px;
    background: var(--ink-1);
    margin: 14px auto 0;
    opacity: 0.7;
  }
  .rule {
    width: 12px;
    height: 1px;
    background: var(--ink-1);
    margin: 16px auto;
    opacity: 0.7;
  }
  .rule-tiny {
    width: 12px;
    height: 1px;
    background: currentColor;
    margin: 12px auto;
    opacity: 0.6;
  }

  /* ---------- Invitation intro (envelope card) ---------- */
  .invite-intro {
    position: fixed;
    inset: 0;
    z-index: 9999;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: clamp(28px, 5vh, 64px);
    background: #F5ECDF;
    transition: opacity 0.95s ease;
  }
  .invite-intro.fade {
    opacity: 0;
    pointer-events: none;
  }
  .invite-caption {
    font-family: var(--f-mono);
    font-size: 14px;
    letter-spacing: 1px;
    text-transform: uppercase;
    color: #3D3C3A;
    opacity: 0;
    animation: inviteCapIn 1s ease 0.25s forwards;
  }
  @keyframes inviteCapIn { to { opacity: 1; } }
  .invite-card-wrap {
    width: min(64vw, 760px);
    max-width: 86vw;
    transform-origin: center top;
    animation: inviteSway 3.2s ease-in-out infinite;
  }
  .invite-card-img {
    display: block;
    width: 100%;
    height: auto;
  }
  @keyframes inviteSway {
    0%   { transform: rotate(-1.4deg) translateX(-8px); }
    50%  { transform: rotate(1.4deg) translateX(8px); }
    100% { transform: rotate(-1.4deg) translateX(-8px); }
  }
  @media (max-width: 600px) {
    .invite-card-wrap { width: 84vw; }
    .invite-caption { font-size: 12px; letter-spacing: 1px; }
  }
  @media (prefers-reduced-motion: reduce) {
    .invite-intro { display: none; }
  }

  /* ---------- Scroll-to-top button ---------- */
  .scroll-top-btn {
    position: fixed;
    bottom: 28px;
    right: 28px;
    width: 44px;
    height: 44px;
    border-radius: 50%;
    border: 0.75px solid var(--bg-brown);
    background: var(--bg-cream);
    color: var(--bg-brown);
    display: inline-flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    opacity: 0;
    transform: translateY(8px);
    pointer-events: none;
    transition: opacity .25s ease, transform .25s ease, background-color .2s ease, color .2s ease;
    z-index: 50;
    box-shadow: 0 2px 12px rgba(57, 24, 23, 0.08);
  }
  .scroll-top-btn.visible {
    opacity: 1;
    transform: translateY(0);
    pointer-events: auto;
  }
  .scroll-top-btn:hover {
    background: var(--bg-brown);
    color: var(--bg-cream);
  }

  /* ---------- Nav ---------- */
  .nav-bar {
    position: fixed;
    top: 0; left: 0; right: 0;
    z-index: 100;
    background: rgba(252, 247, 242, 0.92);
    backdrop-filter: blur(14px) saturate(150%);
    -webkit-backdrop-filter: blur(14px) saturate(150%);
    transition: opacity .3s ease, transform .3s ease;
  }
  .nav-bar.hidden { transform: translateY(-100%); opacity: 0; }
  .nav-inner {
    padding: 18px 40px 14px;
    max-width: none;
    margin: 0 auto;
    position: relative;
    display: grid;
    grid-template-columns: 1fr auto 1fr;
    align-items: start;
    gap: 16px;
  }
  .nav-mono-col {
    grid-column: 2;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 12px;
  }
  .nav-rsvp-col {
    grid-column: 3;
    display: flex;
    justify-content: flex-end;
    align-items: center;
    align-self: start;
    height: 29px;
  }
  .monogram-mini {
    font-family: var(--f-display);
    font-weight: 200;
    font-size: 30px;
    letter-spacing: -0.04em;
    color: var(--ink);
    display: inline-flex;
    align-items: baseline;
    text-decoration: none;
    line-height: 1;
  }
  .monogram-mini .m { display: inline-block; }
  .monogram-mini .j { display: inline-block; margin-left: -1px; color: var(--ink); }
  .monogram-mini-img {
    display: block;
    height: 29px;
    width: auto;
  }
  .nav-links {
    display: flex;
    gap: 22px;
    align-items: center;
  }
  .nav-link {
    font-family: var(--f-mono);
    font-size: 12.5px;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--ink-1);
    text-decoration: none;
    padding: 4px 0;
    border-bottom: 1px solid transparent;
    transition: color .2s, border-color .2s;
    white-space: nowrap;
    position: relative;
  }
  .nav-link + .nav-link::before {
    content: "";
    position: absolute;
    left: -12px;
    top: 50%;
    transform: translateY(-50%);
    width: 0.5px;
    height: 9px;
    background: var(--ink-1);
    opacity: 0.45;
    pointer-events: none;
  }
  .nav-link:hover { color: var(--wine); }
  .nav-link.active {
    color: var(--wine);
    border-bottom-color: var(--wine);
  }
  .nav-rsvp {
    font-family: var(--f-mono);
    font-size: 10.5px;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--ink);
    padding: 8px 22px;
    border-radius: 100px;
    text-decoration: none;
    border: 1px solid var(--ink-1);
    background: var(--bg-warm);
    transition: background .2s, color .2s;
  }
  .nav-rsvp:hover,
  .nav-rsvp:active,
  .nav-rsvp.is-pressed {
    background: var(--wine);
    color: var(--bg-cream);
    border-color: var(--wine);
  }

  /* Mobile nav */
  .nav-menu-btn {
    display: none;
    appearance: none;
    border: 0.5px solid var(--ink-1);
    background: var(--bg-warm);
    border-radius: 100px;
    padding: 13px 20px;
    font-family: var(--f-mono);
    font-size: 10.5px;
    letter-spacing: 1px;
    font-weight: 200;
    line-height: 0.5;
    text-transform: uppercase;
    color: var(--ink);
    cursor: pointer;
    transition: background .2s, color .2s, border-color .2s;
  }
  .nav-menu-btn:hover,
  .nav-menu-btn:active {
    background: var(--wine);
    color: var(--bg-cream);
    border-color: var(--wine);
  }
  @media (max-width: 820px) {
    .nav-inner { grid-template-columns: 1fr auto 1fr; padding: 14px 20px; }
    .nav-links { display: none; }
    .nav-menu-btn { display: inline-flex; align-items: center; grid-column: 1; justify-self: start; }
    .nav-links.open {
      display: flex;
      position: absolute;
      top: calc(100% + 3px);
      left: 20px;
      right: auto;
      width: auto;
      height: auto !important;
      flex-direction: column;
      align-items: flex-start !important;
      text-align: left !important;
      background: var(--bg-cream);
      padding: 15px 24px !important;
      gap: 12px !important;
      border: 1px solid rgba(57, 24, 23, 0.12);
      border-radius: 14px;
      box-shadow: 0 14px 34px rgba(57, 24, 23, 0.16);
      z-index: 300;
    }
  }

  .faq-link {
    color: var(--bg-brown);
    text-decoration: underline;
    text-decoration-thickness: 0.5px;
    text-underline-offset: 3px;
    transition: opacity .2s ease;
  }
  .faq-link:hover { opacity: 0.7; }

  /* ---------- Buttons ---------- */
  .btn {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    font-family: var(--f-mono);
    font-size: 11px;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    padding: 12px 22px;
    border-radius: 100px;
    text-decoration: none;
    border: 1px solid var(--ink);
    color: var(--ink);
    background: transparent;
    cursor: pointer;
    transition: background .2s, color .2s, border-color .2s;
  }
  .btn:hover { background: var(--ink); color: var(--bg-cream); }
  .todo-bg .btn:hover,
  .todo-bg .btn:active,
  .todo-bg .btn:focus {
    background: var(--bg-brown) !important;
    border-color: var(--bg-brown) !important;
    color: var(--bg-cream) !important;
  }
  .btn-solid {
    background: var(--ink);
    color: var(--bg-cream);
  }
  .btn-solid:hover { background: var(--wine); border-color: var(--wine); }
  .btn-link {
    font-family: var(--f-mono);
    font-size: 11px;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--ink);
    text-decoration: none;
    border-bottom: 1px solid var(--ink);
    padding-bottom: 2px;
    transition: color .2s, border-color .2s;
    cursor: pointer;
  }
  .btn-link:hover { color: var(--wine); border-color: var(--wine); }
  .btn-wine {
    background: var(--wine);
    color: var(--bg-cream);
    border-color: var(--wine);
  }
  .btn-wine:hover { background: var(--merlot); border-color: var(--merlot); }

  /* ---------- Image slot styling ---------- */
  image-slot {
    background: var(--bg-light);
    background-image: repeating-linear-gradient(
      45deg,
      transparent 0px,
      transparent 11px,
      rgba(57, 24, 23, 0.04) 11px,
      rgba(57, 24, 23, 0.04) 12px
    );
    border: 1px solid rgba(57, 24, 23, 0.12);
    display: block;
  }

  /* ---------- Hero (stacked MIA & JOE / WEDDING) ---------- */
  .hero {
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 160px 32px 100px;
    position: relative;
    background: var(--bg-cream);
    text-align: center;
  }
  .hero-names {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 0;
    line-height: 0.95;
    margin-bottom: 40px;
  }
  .hero-names-image {
    width: 100%;
    max-width: 720px;
    margin-bottom: 48px;
    opacity: 0;
    transform: translateY(12px);
    animation: heroFadeIn 2.2s cubic-bezier(0.22, 0.61, 0.36, 1) 0.5s forwards;
  }
  .hero-crest {
    display: block;
    width: clamp(86px, 9vw, 116px);
    height: auto;
    margin: 0 auto 26px;
    opacity: 0;
    transform: translateY(10px);
    animation: heroFadeIn 1.6s cubic-bezier(0.22, 0.61, 0.36, 1) 0.15s forwards;
    transform-origin: 50% 80%;
  }
  .hero-heart-divider {
    display: block;
    width: clamp(120px, 14vw, 168px);
    height: auto;
    margin: 30px auto 0;
    opacity: 0;
    animation: heroFadeIn 1.6s cubic-bezier(0.22, 0.61, 0.36, 1) 1.4s forwards;
  }
  @keyframes heroFadeIn {
    to { opacity: 1; transform: translateY(0); }
  }
  .hero-date,
  .hero-location,
  .hero-countdown,
  .hero-rsvp-pill {
    opacity: 0;
    transform: translateY(10px);
    animation: heroFadeIn 1.6s cubic-bezier(0.22, 0.61, 0.36, 1) forwards;
  }
  .hero-date       { animation-delay: 0.95s; }
  .hero-location   { animation-delay: 1.2s; }
  .hero-countdown  { animation-delay: 1.6s; }
  .hero-rsvp-pill  { animation-delay: 1.85s; }
  @media (prefers-reduced-motion: reduce) {
    .hero-names-image,
    .hero-crest,
    .hero-heart-divider,
    .hero-date,
    .hero-location,
    .hero-countdown,
    .hero-rsvp-pill { animation: none; opacity: 1; transform: none; }
  }
  .hero-names-img {
    display: block;
    width: 100%;
    height: auto;
    object-fit: contain;
  }
  .hero-line-1, .hero-line-2 {
    font-family: var(--f-zaslia);
    font-weight: 400;
    text-transform: uppercase;
    color: var(--ink);
    letter-spacing: 0.005em;
    line-height: 0.95;
    -webkit-text-stroke: 1.2px var(--ink);
    text-stroke: 1.2px var(--ink);
  }
  .hero-line-1 { font-size: clamp(60px, 9vw, 130px); }
  .hero-line-2 { font-size: clamp(60px, 9vw, 130px); }
  .hero-names .amp {
    font-family: var(--f-zaslia);
    font-style: normal;
    font-weight: 400;
    color: var(--ink);
    text-transform: uppercase;
    font-size: 1em;
    margin: 0 0.08em;
  }
  .hero-date {
    font-family: var(--f-display);
    font-style: italic;
    font-weight: 400;
    font-size: 28px;
    color: var(--ink);
    line-height: 1;
    letter-spacing: -0.02em;
    margin-top: 8px;
  }
  .hero-location {
    margin-top: 12px;
    font-family: var(--f-sohne);
    font-weight: 400;
    color: #3D3C3A;
    font-size: 10px;
    letter-spacing: 0.05em;
    text-transform: uppercase;
  }
  .hero-countdown {
    margin-top: 60px;
    display: flex;

  /* ---------- Our Story (centered column) ---------- */
  .story-body {

  }
  .story-grid { display: none; }
  .story-pull { display: none; }
  .story-illustration {
    display: flex;
    justify-content: center;
    margin: 32px auto 0;
  }
  /* ---------- Our Story film strip ---------- */
  .story-film {
    display: flex;
    justify-content: center;
    align-items: center;
    gap: 0;
    margin: 80px auto 24px;
    padding: 40px 0;
  }
  .film-strip-h,
  .film-strip-v {
    position: relative;
    background: #161310;
    border-radius: 3px;
    box-shadow: 0 18px 44px rgba(57, 24, 23, 0.22);
    flex: 0 0 auto;
    transform-origin: center center;
  }
  .film-strip-h { padding: 20px 10px; }
  .film-strip-v { padding: 10px 20px; }
  .film-strip-horiz {
    transform: rotate(-13deg);
    margin-top: 110px;
    animation: filmSwayT 5.5s ease-in-out infinite;
  }
  .film-strip-vert {
    transform: rotate(5deg);
    margin-left: -27px;
    z-index: 1;
    animation: filmSwayB 6.5s ease-in-out infinite;
  }
  @keyframes filmSwayT {
    0%, 100% { transform: rotate(-13deg) translateY(0); }
    50%      { transform: rotate(-10.5deg) translateY(-12px); }
  }
  @keyframes filmSwayB {
    0%, 100% { transform: rotate(5deg) translateY(0); }
    50%      { transform: rotate(7.5deg) translateY(-14px); }
  }
  .film-strip-h::before,
  .film-strip-h::after {
    content: "";
    position: absolute;
    left: 0;
    right: 0;
    height: 20px;
    background-image: radial-gradient(circle, #EFE7D6 2.4px, transparent 3px);
    background-size: 17px 20px;
    background-repeat: repeat-x;
    background-position: center;
  }
  .film-strip-h::before { top: 0; }
  .film-strip-h::after { bottom: 0; }
  .film-strip-v::before,
  .film-strip-v::after {
    content: "";
    position: absolute;
    top: 0;
    bottom: 0;
    width: 20px;
    background-image: radial-gradient(circle, #EFE7D6 2.4px, transparent 3px);
    background-size: 20px 17px;
    background-repeat: repeat-y;
    background-position: center;
  }
  .film-strip-v::before { left: 0; }
  .film-strip-v::after { right: 0; }
  .film-frames-h {
    display: flex;
    gap: 5px;
  }
  .film-frames-v {
    display: flex;
    flex-direction: column;
    gap: 5px;
  }
  .film-frame {
    flex: 0 0 auto;
    width: clamp(116px, 13vw, 140px);
    aspect-ratio: 4 / 5;
    background: #000;
    overflow: hidden;
  }
  .film-frame img {
    display: block;
    width: 100%;
    height: 100%;
    object-fit: cover;
  }
  @media (max-width: 640px) {
    .story-film { margin: 56px auto 16px; transform: scale(0.82); }
  }
  @media (prefers-reduced-motion: reduce) {
    .film-strip-horiz, .film-strip-vert { animation: none; }
  }
  .story-illustration-img {
    display: block;
    width: 100%;
    max-width: 140px;
    height: auto;

    transform-origin: 50% 85%;

  }
  @keyframes duckWaddle {
    0%   { transform: translateY(0) rotate(-4deg); }
    25%  { transform: translateY(-6px) rotate(-4deg); }
    50%  { transform: translateY(0) rotate(4deg); }
    75%  { transform: translateY(-6px) rotate(4deg); }
    100% { transform: translateY(0) rotate(-4deg); }
  }
  @media (prefers-reduced-motion: reduce) {
    .story-illustration-img { animation: none; }

  /* ---------- Venue intro ---------- */

  /* ---------- The Big Day / Schedule (alternating timeline) ---------- */
  .bigday-bg { background: var(--bg-cream); }

  .timeline {
    position: relative;
    max-width: 640px;
    margin: 0 auto;
    padding: 20px 0;
  }
  .timeline::before {
    content: "";
    position: absolute;
    top: 0; bottom: 0;
    left: 50%;
    width: 0.5px;
    margin-left: -0.25px;
    background: #9F523E;
  }
  .tl-row {
    position: relative;
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 32px;
    padding: 22px 0;
    min-height: 180px;
    align-items: center;
  }
  .tl-row::before {
    content: "";
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    width: 11px;
    height: 11px;
    border-radius: 50%;
    background: var(--bg-cream);
    border: 0.5px solid #9F523E;
    z-index: 1;
    transition: background-color .45s ease;
  }
  .tl-row.is-filled::before {
    background: #9F523E;
  }
  .tl-side-empty { visibility: hidden; }
  .tl-illo {
    display: flex;
    align-items: center;
    padding: 0;
  }
  .tl-row.left .tl-illo { justify-content: flex-start; padding-left: 40px; }
  .tl-row.right .tl-illo { justify-content: flex-end; padding-right: 40px; }
  .tl-illo-img {
    display: block;
    width: 100%;
    max-width: 130px;
    height: auto;
    object-fit: contain;
    transform-origin: 50% 80%;
    animation: tlIlloFloat 4.2s ease-in-out infinite;
  }
  .tl-row:nth-child(2n) .tl-illo-img { animation-duration: 5s; animation-delay: -1.3s; }
  .tl-row:nth-child(3n) .tl-illo-img { animation-duration: 4.6s; animation-delay: -0.7s; }
  .tl-row:nth-child(5n) .tl-illo-img { animation-duration: 5.4s; animation-delay: -2s; }
  @keyframes tlIlloFloat {
    0%   { transform: translateY(0) rotate(-3deg); }
    50%  { transform: translateY(-7px) rotate(3deg); }
    100% { transform: translateY(0) rotate(-3deg); }
  }
  @media (prefers-reduced-motion: reduce) {
    .tl-illo-img { animation: none; }
  }
  .tl-row.left .tl-side.event {
    text-align: right;
    padding-right: 28px;
  }
  .tl-row.right .tl-side.event {
    text-align: left;
    padding-left: 28px;
  }
  .tl-title {
    font-family: var(--f-display);
    font-style: italic;
    font-weight: 400;
    font-size: clamp(22px, 2.4vw, 30px);
    color: var(--ink);

    margin: 0 0 10px 0;

  .tl-meta {
    font-family: var(--f-mono);

  .tl-desc {

  .tl-interlude-label {

  .tl-row.interlude::before {

  @media (max-width: 640px) {
    .timeline::before { left: 20px; }
