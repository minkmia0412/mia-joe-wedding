<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Mia &amp; Joe · 10.10.2026</title>

<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=EB+Garamond:ital,wght@0,400;0,500;0,600;0,700;1,400;1,500;1,600&display=swap" rel="stylesheet" />

<style>
  /* ---------- @font-face ---------- */
  @font-face {
    font-family: "Zaslia";
    src: url("fonts/Zaslia.otf") format("opentype");
    font-weight: 400;
    font-style: normal;
    font-display: swap;
  }
  @font-face {
    font-family: "PP Editorial New";
    src: url("fonts/PPEditorialNew-Regular.otf") format("opentype");
    font-weight: 400;
    font-style: normal;
    font-display: swap;
  }
  @font-face {
    font-family: "PP Editorial New";
    src: url("fonts/PPEditorialNew-Italic.otf") format("opentype");
    font-weight: 400;
    font-style: italic;
    font-display: swap;
  }
  @font-face {
    font-family: "PP Editorial New";
    src: url("fonts/PPEditorialNew-Ultralight.otf") format("opentype");
    font-weight: 200;
    font-style: normal;
    font-display: swap;
  }
  @font-face {
    font-family: "PP Editorial New";
    src: url("fonts/PPEditorialNew-UltralightItalic.otf") format("opentype");
    font-weight: 200;
    font-style: italic;
    font-display: swap;
  }
  @font-face {
    font-family: "PP Editorial New";
    src: url("fonts/PPEditorialNew-Ultrabold.otf") format("opentype");
    font-weight: 800;
    font-style: normal;
    font-display: swap;
  }
  @font-face {
    font-family: "Sohne Breit";
    src: url("fonts/TestSohneBreit-Leicht.otf") format("opentype");
    font-weight: 300;
    font-style: normal;
    font-display: swap;
  }
  @font-face {
    font-family: "Sohne Breit";
    src: url("fonts/TestSohneBreit-Buch.otf") format("opentype");
    font-weight: 400;
    font-style: normal;
    font-display: swap;
  }
  @font-face {
    font-family: "Sohne Breit";
    src: url("fonts/TestSohneBreit-BuchKursiv.otf") format("opentype");
    font-weight: 400;
    font-style: italic;
    font-display: swap;
  }
  @font-face {
    font-family: "Sohne Breit";
    src: url("fonts/TestSohneBreit-Kraftig.otf") format("opentype");
    font-weight: 500;
    font-style: normal;
    font-display: swap;
  }
  @font-face {
    font-family: "Sohne Breit";
    src: url("fonts/TestSohneBreit-Halbfett.otf") format("opentype");
    font-weight: 600;
    font-style: normal;
    font-display: swap;
  }
  @font-face {
    font-family: "Anonymous Pro";
    src: url("fonts/AnonymousPro-Regular.ttf") format("truetype");
    font-weight: 400;
    font-style: normal;
    font-display: swap;
  }
  @font-face {
    font-family: "Anonymous Pro";
    src: url("fonts/AnonymousPro-Italic.ttf") format("truetype");
    font-weight: 400;
    font-style: italic;
    font-display: swap;
  }
  @font-face {
    font-family: "Anonymous Pro";
    src: url("fonts/AnonymousPro-Bold.ttf") format("truetype");
    font-weight: 700;
    font-style: normal;
    font-display: swap;
  }
  @font-face {
    font-family: "Anonymous Pro";
    src: url("fonts/AnonymousPro-BoldItalic.ttf") format("truetype");
    font-weight: 700;
    font-style: italic;
    font-display: swap;
  }

  :root {
    /* Backgrounds */
    --bg-cream:  #FCF7F2;
    --bg-light:  #F1EEE6;
    --bg-warm:   #F0EAD8;
    --bg-mid:    #DAD6CB;
    --bg-brown:  #391817;
    --bg-tan:    #796D51;

    /* Ink */
    --ink:       #050505;
    --ink-1:     #3D3C3A;
    --ink-2:     #6F6F6F;

    /* Accents */
    --wine:      #4C0000;
    --merlot:    #6B2D2D;
    --terra:     #9F523E;
    --olive:     #757153;
    --sage:      #AC9D60;
    --pink-1:    #C9A8A2;
    --pink-2:    #D9BFBA;
    --pink-3:    #E8D1CC;

    /* Type */
    --f-zaslia:  "Zaslia", "Bodoni Moda", "Times New Roman", serif;
    --f-display: "PP Editorial New", "EB Garamond", "Times New Roman", serif;
    --f-display-alt: "Zaslia", "Bodoni Moda", serif;
    --f-serif:   "EB Garamond", "PP Editorial New", "Times New Roman", serif;
    --f-sohne:   "Sohne Breit", ui-sans-serif, system-ui, sans-serif;
    --f-mono:    "Anonymous Pro", ui-monospace, "SF Mono", Menlo, monospace;
  }

  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; }
  html { scroll-behavior: smooth; }

  body {
    background: var(--bg-cream);
    color: var(--ink);
    font-family: var(--f-display);
    font-weight: 400;
    font-size: 17px;
    line-height: 1.2;
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
    overflow-x: hidden;
  }

  /* ---------- Typography ---------- */
  .display-1 {
    font-family: var(--f-zaslia);
    font-weight: 400;
    font-size: clamp(72px, 13.5vw, 220px);
    line-height: 0.92;
    letter-spacing: 0.005em;
    color: var(--ink);
    text-transform: uppercase;
  }
  .display-2 {
    font-family: var(--f-display);
    font-weight: 400;
    font-size: clamp(48px, 7vw, 108px);
    line-height: 0.98;
    letter-spacing: -0.01em;
  }
  .h-1 {
    font-family: var(--f-display);
    font-weight: 400;
    font-size: clamp(40px, 5.5vw, 80px);
    line-height: 1.05;
    letter-spacing: -0.005em;
  }
  .h-2 {
    font-family: var(--f-display);
    font-weight: 400;
    font-size: clamp(28px, 3.4vw, 44px);
    line-height: 1.15;
    letter-spacing: -0.003em;
  }
  .h-3 {
    font-family: var(--f-display);
    font-style: italic;
    font-weight: 400;
    font-size: clamp(20px, 2.2vw, 28px);
    line-height: 1.3;
  }
  .h-section {
    font-family: var(--f-zaslia);
    font-weight: 400;
    font-size: clamp(56px, 8.4vw, 124px);
    line-height: 0.95;
    letter-spacing: 0.005em;
    text-transform: uppercase;
  }
  .eyebrow {
    font-family: var(--f-mono);
    font-size: 11px;
    font-weight: 400;
    letter-spacing: 0.22em;
    text-transform: uppercase;
    color: var(--ink-1);
  }
  .eyebrow-sm {
    font-family: var(--f-mono);
    font-size: 10px;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: var(--ink-2);
  }
  .mono {
    font-family: var(--f-mono);
    letter-spacing: 0.04em;
  }
  .body-lg {
    font-family: var(--f-display);
    font-weight: 400;
    font-size: 19px;
    line-height: 1.25;
    color: var(--ink-1);
  }
  .body {
    font-family: var(--f-display);
    font-weight: 400;
    font-size: 17px;
    line-height: 1.25;
    color: var(--ink-1);
  }

  /* ---------- Layout ---------- */
  .container {
    width: 100%;
    max-width: 1280px;
    margin: 0 auto;
    padding: 0 32px;
  }
  .container-narrow {
    width: 100%;
    max-width: 880px;
    margin: 0 auto;
    padding: 0 32px;
  }
  section {
    padding: 100px 0;
    position: relative;
  }
  section[data-screen-label] { scroll-margin-top: 110px; }

  /* Minimal section header (Söhne Breit Kraftig) */
  .section-header {
    text-align: center;
    margin-bottom: 56px;
  }
  .section-header-label {
    font-family: var(--f-sohne);
    font-weight: 500;
    font-size: 18px;
    letter-spacing: 0.05em;
    text-transform: uppercase;
    color: var(--ink);
  }
  .section-header-rule {
    width: 12px;
    height: 1px;
    background: var(--ink-1);
    margin: 14px auto 0;
    opacity: 0.7;
  }
  .rule {
    width: 12px;
    height: 1px;
    background: var(--ink-1);
    margin: 16px auto;
    opacity: 0.7;
  }
  .rule-tiny {
    width: 12px;
    height: 1px;
    background: currentColor;
    margin: 12px auto;
    opacity: 0.6;
  }

  /* ---------- Nav (centered logo, links below) ---------- */
  .nav-bar {
    position: fixed;
    top: 0; left: 0; right: 0;
    z-index: 100;
    background: rgba(252, 247, 242, 0.92);
    backdrop-filter: blur(14px) saturate(150%);
    -webkit-backdrop-filter: blur(14px) saturate(150%);
    transition: opacity .3s ease, transform .3s ease;
  }
  .nav-bar.hidden { transform: translateY(-100%); opacity: 0; }
  .nav-inner {
    padding: 18px 32px 14px;
    max-width: 1440px;
    margin: 0 auto;
    position: relative;
    display: grid;
    grid-template-columns: 1fr auto 1fr;
    align-items: start;
    gap: 16px;
  }
  .nav-mono-col {
    grid-column: 2;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 12px;
  }
  .nav-rsvp-col {
    grid-column: 3;
    display: flex;
    justify-content: flex-end;
    align-items: center;
  }
  .monogram-mini {
    font-family: var(--f-zaslia);
    font-size: 24px;
    letter-spacing: 0.04em;
    color: var(--ink);
    display: inline-flex;
    align-items: baseline;
    gap: 1px;
    text-decoration: none;
  }
  .monogram-mini .m { transform: translateY(-2px); display: inline-block; }
  .monogram-mini .j { transform: translateY(3px); display: inline-block; color: var(--ink); }
  .nav-links {
    display: flex;
    gap: 22px;
    align-items: center;
  }
  .nav-link {
    font-family: var(--f-mono);
    font-size: 10.5px;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--ink-1);
    text-decoration: none;
    padding: 4px 0;
    border-bottom: 1px solid transparent;
    transition: color .2s, border-color .2s;
    white-space: nowrap;
  }
  .nav-link:hover { color: var(--wine); }
  .nav-link.active {
    color: var(--wine);
    border-bottom-color: var(--wine);
  }
  .nav-rsvp {
    font-family: var(--f-mono);
    font-size: 10.5px;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--ink);
    padding: 8px 22px;
    border-radius: 100px;
    text-decoration: none;
    border: 1px solid var(--ink-1);
    background: transparent;
    transition: background .2s, color .2s;
  }
  .nav-rsvp:hover {
    background: var(--ink);
    color: var(--bg-cream);
  }

  /* Mobile nav */
  .nav-menu-btn {
    display: none;
    appearance: none;
    border: 1px solid var(--ink-1);
    background: transparent;
    border-radius: 100px;
    padding: 6px 14px;
    font-family: var(--f-mono);
    font-size: 10px;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    cursor: pointer;
  }
  @media (max-width: 820px) {
    .nav-inner { grid-template-columns: 1fr auto 1fr; padding: 14px 20px; }
    .nav-links { display: none; }
    .nav-menu-btn { display: inline-flex; grid-column: 1; justify-self: start; }
    .nav-links.open {
      display: flex;
      position: absolute;
      top: 100%;
      right: 0;
      left: 0;
      flex-direction: column;
      background: var(--bg-cream);
      padding: 24px 32px 32px;
      gap: 18px;
      border-bottom: 1px solid rgba(57, 24, 23, 0.08);
    }
  }

  /* ---------- Buttons ---------- */
  .btn {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    font-family: var(--f-mono);
    font-size: 11px;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    padding: 12px 22px;
    border-radius: 100px;
    text-decoration: none;
    border: 1px solid var(--ink);
    color: var(--ink);
    background: transparent;
    cursor: pointer;
    transition: background .2s, color .2s, border-color .2s;
  }
  .btn:hover { background: var(--ink); color: var(--bg-cream); }
  .btn-solid {
    background: var(--ink);
    color: var(--bg-cream);
  }
  .btn-solid:hover { background: var(--wine); border-color: var(--wine); }
  .btn-link {
    font-family: var(--f-mono);
    font-size: 11px;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--ink);
    text-decoration: none;
    border-bottom: 1px solid var(--ink);
    padding-bottom: 2px;
    transition: color .2s, border-color .2s;
    cursor: pointer;
  }
  .btn-link:hover { color: var(--wine); border-color: var(--wine); }
  .btn-wine {
    background: var(--wine);
    color: var(--bg-cream);
    border-color: var(--wine);
  }
  .btn-wine:hover { background: var(--merlot); border-color: var(--merlot); }

  /* ---------- Image slot styling ---------- */
  image-slot {
    background: var(--bg-light);
    background-image: repeating-linear-gradient(
      45deg,
      transparent 0px,
      transparent 11px,
      rgba(57, 24, 23, 0.04) 11px,
      rgba(57, 24, 23, 0.04) 12px
    );
    border: 1px solid rgba(57, 24, 23, 0.12);
    display: block;
  }

  /* ---------- Hero (stacked MIA & JOE / WEDDING) ---------- */
  .hero {
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 160px 32px 100px;
    position: relative;
    background: var(--bg-cream);
    text-align: center;
  }
  .hero-names {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 0;
    line-height: 0.95;
    margin-bottom: 40px;
  }
  .hero-line-1, .hero-line-2 {
    font-family: var(--f-zaslia);
    font-weight: 400;
    text-transform: uppercase;
    color: var(--ink);
    letter-spacing: 0.005em;
    line-height: 0.95;
    -webkit-text-stroke: 2px var(--ink);
    text-stroke: 2px var(--ink);
  }
  .hero-line-1 { font-size: clamp(60px, 9vw, 130px); }
  .hero-line-2 { font-size: clamp(60px, 9vw, 130px); }
  .hero-names .amp {
    font-family: var(--f-zaslia);
    font-style: normal;
    font-weight: 400;
    color: var(--ink);
    text-transform: uppercase;
    font-size: 1em;
    margin: 0 0.08em;
  }
  .hero-date {
    font-family: var(--f-display);
    font-style: italic;
    font-weight: 400;
    font-size: 28px;
    color: var(--ink);
    line-height: 1;
    letter-spacing: -0.02em;
    margin-top: 8px;
  }
  .hero-location {
    margin-top: 12px;
    font-family: var(--f-sohne);
    font-weight: 400;
    color: #3D3C3A;
    font-size: 10px;
    letter-spacing: 0.05em;
    text-transform: uppercase;
  }
  .hero-countdown {
    margin-top: 60px;
    display: flex;
    gap: 18px;
    justify-content: center;
    align-items: baseline;
    color: var(--ink);
  }
  .hero-countdown-item {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 10px;
    min-width: 80px;
  }
  .hero-countdown-num {
    font-family: var(--f-display);
    font-weight: 200;
    font-size: 70px;
    line-height: 1;
    letter-spacing: -0.03em;
    color: var(--ink);
  }
  .hero-countdown-lbl {
    font-family: var(--f-sohne);
    font-weight: 400;
    font-size: 15px;
    letter-spacing: 0.05em;
    text-transform: uppercase;
    color: var(--ink-1);
  }
  .hero-countdown-colon {
    font-family: var(--f-display);
    font-weight: 200;
    font-size: 56px;
    color: var(--ink-2);
    transform: translateY(-0.55em);
    line-height: 1;
  }
  .hero-rsvp-pill {
    margin-top: 48px;
    display: inline-flex;
    align-items: center;
    padding: 11px 32px;
    border-radius: 100px;
    border: 1px solid var(--ink-1);
    background: transparent;
    color: var(--ink);
    font-family: var(--f-mono);
    font-size: 11px;
    letter-spacing: 0.24em;
    text-transform: uppercase;
    text-decoration: none;
    transition: background .2s, color .2s, border-color .2s;
  }
  .hero-rsvp-pill:hover {
    background: var(--wine);
    color: var(--bg-cream);
    border-color: var(--wine);
  }
  .hero-scroll {
    position: absolute;
    bottom: 36px;
    left: 50%;
    transform: translateX(-50%);
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 8px;
    color: var(--ink-2);
    font-family: var(--f-mono);
    font-size: 9px;
    letter-spacing: 0.28em;
    text-transform: uppercase;
  }
  .hero-scroll-line {
    width: 1px;
    height: 32px;
    background: var(--ink-2);
    opacity: 0.5;
    animation: scrollPulse 2.2s ease-in-out infinite;
  }
  @keyframes scrollPulse {
    0%, 100% { transform: scaleY(0.4); transform-origin: top; opacity: 0.3; }
    50% { transform: scaleY(1); opacity: 0.7; }
  }

  /* ---------- Our Story (narrow centered column) ---------- */
  .story-body {
    max-width: 480px;
    margin: 0 auto;
    text-align: center;
    font-family: var(--f-serif);
    font-size: 14.5px;
    line-height: 1.25;
    color: var(--ink);
  }
  .story-body p {
    margin: 0 0 1em 0;
  }
  .story-body p:last-child {
    margin-top: 1em;
    color: var(--ink-1);
    font-style: italic;
  }
  .story-grid { display: none; }
  .story-pull { display: none; }

  /* ---------- The Big Day / Schedule (alternating timeline) ---------- */
  .bigday-bg { background: var(--bg-cream); }

  .timeline {
    position: relative;
    max-width: 640px;
    margin: 0 auto;
    padding: 20px 0;
  }
  .timeline::before {
    content: "";
    position: absolute;
    top: 0; bottom: 0;
    left: 50%;
    width: 1px;
    background: rgba(57, 24, 23, 0.25);
  }
  .tl-row {
    position: relative;
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 32px;
    padding: 22px 0;
    align-items: start;
  }
  .tl-row::before {
    content: "";
    position: absolute;
    top: 30px;
    left: 50%;
    transform: translateX(-50%);
    width: 7px;
    height: 7px;
    border-radius: 50%;
    background: var(--bg-cream);
    border: 1px solid var(--ink-1);
    z-index: 1;
  }
  .tl-side-empty { visibility: hidden; }
  .tl-row.left .tl-side.event {
    text-align: right;
    padding-right: 28px;
  }
  .tl-row.right .tl-side.event {
    text-align: left;
    padding-left: 28px;
  }
  .tl-title {
    font-family: var(--f-display);
    font-style: italic;
    font-weight: 400;
    font-size: clamp(22px, 2.4vw, 30px);
    color: var(--ink);
    line-height: 1.1;
    margin: 0 0 10px 0;
  }
  .tl-meta {
    font-family: var(--f-mono);
    font-size: 9.5px;
    letter-spacing: 0.22em;
    text-transform: uppercase;
    color: var(--ink-1);
    margin: 0 0 12px 0;
  }
  .tl-desc {
    font-family: var(--f-serif);
    font-size: 13.5px;
    line-height: 1.2;
    color: var(--ink-1);
    margin: 0;
  }
  .tl-interlude-label {
    font-family: var(--f-mono);
    font-size: 9.5px;
    letter-spacing: 0.24em;
    text-transform: uppercase;
    color: var(--ink-1);
    margin-bottom: 6px;
  }
  .tl-interlude-text {
    font-family: var(--f-serif);
    font-style: italic;
    font-size: 13.5px;
    color: var(--ink-1);
    max-width: 260px;
    margin: 0;
    line-height: 1.2;
  }
  .tl-row.interlude::before { display: none; }

  @media (max-width: 640px) {
    .timeline::before { left: 20px; }
    .tl-row { grid-template-columns: 1fr; padding-left: 40px; }
    .tl-row::before { left: 20px; }
    .tl-side-empty { display: none; }
    .tl-row.left .tl-side.event,
    .tl-row.right .tl-side.event {
      text-align: left;
      padding: 0;
    }
  }

  /* Hide old schedule */
  .schedule { display: none; }

  /* ---------- Attire (centered minimal) ---------- */
  .attire-wrap {
    max-width: 480px;
    margin: 0 auto;
    text-align: center;
  }
  .attire-text {
    font-family: var(--f-serif);
    font-size: 14px;
    line-height: 1.25;
    color: var(--ink);
    margin: 0 auto 24px;
  }
  .attire-list {
    list-style: none;
    padding: 0;
    margin: 0 auto;
    text-align: left;
    display: inline-block;
    max-width: 440px;
  }
  .attire-list li {
    padding: 4px 0;
    font-family: var(--f-serif);
    color: var(--ink-1);
    font-size: 13.5px;
    line-height: 1.2;
    display: flex;
    gap: 8px;
